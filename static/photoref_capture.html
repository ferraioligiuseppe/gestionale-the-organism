<!DOCTYPE html><html><head><meta charset="utf-8"><title>Photoref AI Capture</title></head><body>
<div style="font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#0d1117;color:#e6edf3;padding:14px;border-radius:10px;max-width:460px;margin:0 auto">
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
    <span id="pr_step" style="font-weight:700">1/2 — Occhio destro (OD)</span>
  </div>
  <div style="position:relative;width:100%;aspect-ratio:4/3;background:#000;border-radius:8px;overflow:hidden;margin:0 auto">
    <video id="pr_video" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover"></video>
    <canvas id="pr_overlay" style="position:absolute;left:0;top:0;width:100%;height:100%"></canvas>
  </div>
  <canvas id="pr_shot" style="display:none"></canvas>
  <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center">
    <button id="pr_torch" style="padding:10px 14px;border-radius:7px;border:none;background:#30363d;color:#fff;font-weight:600">🔦 Flash</button>
    <button id="pr_zoom_in" style="padding:10px 14px;border-radius:7px;border:none;background:#30363d;color:#fff;font-weight:600">🔍+ Zoom</button>
    <button id="pr_zoom_out" style="padding:10px 14px;border-radius:7px;border:none;background:#30363d;color:#fff;font-weight:600">🔍- Zoom</button>
    <button id="pr_capture" style="padding:10px 18px;border-radius:7px;border:none;background:#2ea44f;color:#fff;font-weight:700">📸 Scatta</button>
  </div>
  <div id="pr_msg" style="font-size:13px;color:#f0883e;margin-top:8px;text-align:center"></div>
  <div id="pr_preview" style="display:none;margin-top:12px;text-align:center">
    <img id="pr_img_od" style="max-width:140px;border-radius:6px;margin:4px" />
    <img id="pr_img_os" style="max-width:140px;border-radius:6px;margin:4px" />
    <div style="font-size:13px;color:#7ee787;margin-top:8px">Le 2 foto si sono scaricate: caricale nel gestionale, tab Photoref AI.</div>
  </div>
</div>
<script>
(function(){
  const video = document.getElementById('pr_video');
  const overlay = document.getElementById('pr_overlay');
  const octx = overlay.getContext('2d');
  const shot = document.getElementById('pr_shot');
  const msg = document.getElementById('pr_msg');
  const stepEl = document.getElementById('pr_step');
  let stream=null, track=null, zoomCap=null, zoomVal=1, torchOn=false, step=0;
  let shots=[null,null];

  function drawGuide(){
    octx.clearRect(0,0,overlay.width,overlay.height);
    octx.strokeStyle='#f0883e'; octx.lineWidth=3; octx.setLineDash([10,7]);
    octx.beginPath();
    octx.ellipse(overlay.width/2, overlay.height/2, overlay.width*0.18, overlay.height*0.28, 0, 0, 6.2832);
    octx.stroke();
  }

  async function start(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment', width:{ideal:1280}, height:{ideal:960}}});
      video.srcObject = stream;
      await video.play();
      overlay.width = video.videoWidth||420; overlay.height = video.videoHeight||315;
      drawGuide();
      track = stream.getVideoTracks()[0];
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if (caps.zoom) zoomCap = caps.zoom;
      if (!caps.torch) document.getElementById('pr_torch').style.opacity='0.4';
      requestAnimationFrame(loop);
    }catch(e){
      msg.textContent = 'Impossibile avviare la fotocamera: ' + e.message + ' — consenti l\'accesso e usa Chrome/Safari.';
    }
  }
  function loop(){ drawGuide(); requestAnimationFrame(loop); }

  document.getElementById('pr_torch').onclick = async ()=>{
    if(!track) return;
    torchOn = !torchOn;
    try{ await track.applyConstraints({advanced:[{torch:torchOn}]}); }
    catch(e){ msg.textContent='Flash non supportato su questo dispositivo.'; }
  };
  document.getElementById('pr_zoom_in').onclick = async ()=>{
    if(!track||!zoomCap) return;
    zoomVal = Math.min(zoomCap.max, zoomVal + (zoomCap.step||0.5));
    try{ await track.applyConstraints({advanced:[{zoom:zoomVal}]}); }catch(e){}
  };
  document.getElementById('pr_zoom_out').onclick = async ()=>{
    if(!track||!zoomCap) return;
    zoomVal = Math.max(zoomCap.min||1, zoomVal - (zoomCap.step||0.5));
    try{ await track.applyConstraints({advanced:[{zoom:zoomVal}]}); }catch(e){}
  };

  document.getElementById('pr_capture').onclick = ()=>{
    shot.width = video.videoWidth; shot.height = video.videoHeight;
    const sctx = shot.getContext('2d');
    sctx.drawImage(video, 0, 0);
    const cx = shot.width/2, cy = shot.height/2, rw = shot.width*0.20, rh = shot.height*0.30;
    const crop = document.createElement('canvas'); crop.width=rw*2; crop.height=rh*2;
    crop.getContext('2d').drawImage(shot, cx-rw, cy-rh, rw*2, rh*2, 0, 0, rw*2, rh*2);
    const dataUrl = crop.toDataURL('image/jpeg', 0.92);
    shots[step] = dataUrl;
    if (step===0){
      document.getElementById('pr_img_od').src = dataUrl;
      step = 1; stepEl.textContent = '2/2 — Occhio sinistro (OS)';
      msg.textContent = 'OD acquisito. Ora inquadra OS.';
    } else {
      document.getElementById('pr_img_os').src = dataUrl;
      document.getElementById('pr_preview').style.display='block';
      msg.style.color = '#7ee787';
      msg.textContent = 'Entrambe le foto acquisite: scaricate.';
      if(stream) stream.getTracks().forEach(t=>t.stop());
      const a1=document.createElement('a'); a1.href=shots[0]; a1.download='photoref_OD.jpg'; a1.click();
      setTimeout(()=>{ const a2=document.createElement('a'); a2.href=shots[1]; a2.download='photoref_OS.jpg'; a2.click(); }, 400);
    }
  };
  start();
})();
</script>
</body></html>
