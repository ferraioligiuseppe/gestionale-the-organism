name: Popola DB Test (pazienti finti)

# Esecuzione MANUALE. Aggiunge pazienti finti al DB di TEST per fare prove,
# SENZA cancellare nulla. Non tocca mai la produzione (controllo sul nome DB).

on:
  workflow_dispatch:
    inputs:
      numero:
        description: "Quanti pazienti finti creare"
        required: true
        default: "10"
      studio:
        description: "studio_id a cui assegnarli"
        required: true
        default: "1"

jobs:
  popola:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Installa psycopg2
        run: |
          python -m pip install --upgrade pip
          pip install "psycopg2-binary>=2.9.9"

      - name: Popola il DB di test
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NUMERO: ${{ inputs.numero }}
          STUDIO: ${{ inputs.studio }}
        run: python scripts/popola_test.py
