name: Promemoria Eventi Notturni

# Esegue i promemoria eventi (48h/24h) collegandosi DIRETTAMENTE al database
# e all'SMTP, senza passare dall'app Streamlit (che è privata e non raggiungibile
# da un cron anonimo). Tutta la logica gira in Python dentro il runner GitHub.

on:
  schedule:
    # 06:00 UTC = circa le 08:00 in Italia. I cron schedulati girano dal branch di default (main).
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Prova senza inviare davvero? (true / false)"
        required: false
        default: "false"

# Evita esecuzioni sovrapposte
concurrency:
  group: promemoria-eventi
  cancel-in-progress: false

jobs:
  promemoria:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          # Servono solo queste due: lo script riusa la logica del gestionale,
          # che per gli eventi dipende solo da streamlit (per st.secrets) e psycopg2.
          pip install "streamlit>=1.40,<1.46" "psycopg2-binary>=2.9.9"

      - name: Scrivi i secrets in .streamlit/secrets.toml
        env:
          STREAMLIT_SECRETS: ${{ secrets.STREAMLIT_SECRETS }}
        run: |
          mkdir -p .streamlit
          printf '%s' "$STREAMLIT_SECRETS" > .streamlit/secrets.toml
          # Verifica minima che il secret non sia vuoto
          if [ ! -s .streamlit/secrets.toml ]; then
            echo "::error::Il secret STREAMLIT_SECRETS è vuoto o non configurato."
            exit 1
          fi

      - name: Esegui promemoria
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python scripts/invia_promemoria.py

      - name: Rimuovi i secrets (sempre)
        if: always()
        run: rm -f .streamlit/secrets.toml
