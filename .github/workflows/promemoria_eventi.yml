name: Promemoria Eventi Notturni

# Esegue ogni notte alle 08:00 ora italiana (06:00 UTC in ora legale, 07:00 UTC in ora solare).
# Per coprire entrambi i periodi senza complicazioni, giriamo alle 06:00 UTC.
on:
  schedule:
    - cron: '0 6 * * *'
  # Permette anche l'esecuzione manuale dal tab Actions di GitHub
  workflow_dispatch:

jobs:
  trigger-promemoria:
    runs-on: ubuntu-latest
    steps:
      - name: Chiama endpoint promemoria
        run: |
          echo "Triggering promemoria eventi..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://gestionale-the-organism.streamlit.app/cron_promemoria?token=${{ secrets.CRON_TOKEN }}")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP status: $CODE"
          echo "Risposta:"
          echo "$BODY"
          # Streamlit Cloud risponde con HTML: il controllo e' best-effort.
          # Fallisce il job solo se la richiesta non e' andata a buon fine (status non 2xx).
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::Endpoint promemoria ha risposto con status $CODE"
            exit 1
          fi
