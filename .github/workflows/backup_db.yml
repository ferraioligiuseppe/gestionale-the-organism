name: Backup Database

# Backup automatico giornaliero del database PostgreSQL su Cloudflare R2.
# Indipendente da OVH: dump diretto, cifrato, caricato sul tuo storage.

on:
  schedule:
    # 02:30 UTC = circa le 04:30 in Italia (di notte, prima dei promemoria).
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      db_label:
        description: "Etichetta nel nome file (es. prod)"
        required: false
        default: "prod"

concurrency:
  group: backup-database
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Installa pg_dump (postgresql-client 17) e boto3
        run: |
          # client recente dal repository ufficiale PostgreSQL (PGDG):
          # pg_dump deve essere >= versione del server. Il 17 copre i server fino al 17.
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          pip install "boto3>=1.34.0"

      - name: Scrivi i secrets in .streamlit/secrets.toml
        env:
          STREAMLIT_SECRETS: ${{ secrets.STREAMLIT_SECRETS }}
        run: |
          mkdir -p .streamlit
          printf '%s' "$STREAMLIT_SECRETS" > .streamlit/secrets.toml
          if [ ! -s .streamlit/secrets.toml ]; then
            echo "::error::Il secret STREAMLIT_SECRETS è vuoto o non configurato."
            exit 1
          fi

      - name: Esegui backup
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
          DB_LABEL: ${{ github.event.inputs.db_label }}
          KEEP_DAILY: "14"
          KEEP_WEEKLY: "8"
          KEEP_MONTHLY: "12"
        run: python scripts/backup_db.py

      - name: Rimuovi i secrets (sempre)
        if: always()
        run: rm -f .streamlit/secrets.toml
