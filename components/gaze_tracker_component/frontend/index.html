<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaze Tracker Component</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://unpkg.com/streamlit-component-lib@2.0.0/dist/index.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <button id="startBtn">Avvia webcam</button>
      <button id="stopBtn">Stop</button>
      <span id="status">In attesa webcam</span>
    </div>
    <div class="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>
    <div class="metrics">
      <div><strong>Gaze:</strong> <span id="gaze">--</span></div>
      <div><strong>Head tilt:</strong> <span id="tilt">--</span></div>
      <div><strong>Blink:</strong> <span id="blink">--</span></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
