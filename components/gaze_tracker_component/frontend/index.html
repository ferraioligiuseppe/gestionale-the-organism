<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaze Tracker Component</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://unpkg.com/streamlit-component-lib/dist/index.js"></script>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button id="startBtn">Avvia camera</button>
      <button id="stopBtn">Stop</button>
      <span id="status">idle</span>
    </div>

    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div id="overlay">Camera non avviata</div>
    </div>

    <div class="footer">
      <small id="info">In attesa…</small>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
